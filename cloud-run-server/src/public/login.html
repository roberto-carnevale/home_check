<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Check Login</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --muted: #94a3b8; --accent: #6366f1; }
        * { box-sizing: border-box; font-family: Inter, sans-serif; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 20px; background: var(--bg); color: var(--text); }
        main { width: min(100%, 420px); padding: 32px; background: var(--panel); border-radius: 12px; }
        h1 { margin-top: 0; }
        p { color: var(--muted); line-height: 1.5; }
        label { display: block; margin: 24px 0 8px; color: var(--muted); }
        input, button { width: 100%; padding: 12px; border-radius: 8px; font-size: 1rem; }
        input { border: 1px solid #475569; background: #0f172a; color: var(--text); letter-spacing: 0.2em; }
        button { margin-top: 16px; border: 0; background: var(--accent); color: white; font-weight: 600; cursor: pointer; }
        button:disabled { opacity: 0.6; cursor: wait; }
        #message { min-height: 1.5em; color: var(--muted); }
    </style>
</head>
<body>
    <main>
        <h1>Home Check</h1>
        <p>Request a six-digit access code. It will be sent to all configured administrator email addresses.</p>
        <button id="requestCode" type="button">Email access code</button>
        <form id="verifyForm" hidden>
            <label for="code">Six-digit code</label>
            <input id="code" name="code" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" required>
            <button type="submit">Open dashboard</button>
        </form>
        <p id="message" role="status"></p>
    </main>
    <script>
        const requestButton = document.getElementById('requestCode');
        const form = document.getElementById('verifyForm');
        const message = document.getElementById('message');

        requestButton.addEventListener('click', async () => {
            requestButton.disabled = true;
            message.textContent = 'Sending access code...';
            try {
                const response = await fetch('/api/auth/request-code', { method: 'POST' });
                if (!response.ok) throw new Error('Request failed');
                form.hidden = false;
                document.getElementById('code').focus();
                message.textContent = 'Check the administrator email inboxes for the code.';
            } catch (error) {
                message.textContent = 'Unable to send an access code.';
                requestButton.disabled = false;
            }
        });

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const code = document.getElementById('code').value;
            try {
                const response = await fetch('/api/auth/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });
                if (!response.ok) throw new Error('Verification failed');
                window.location.href = '/';
            } catch (error) {
                message.textContent = 'That code is invalid or expired.';
            }
        });
    </script>
</body>
</html>
